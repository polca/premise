metadata:
  description: 'Deterministic LCIA score regression references for ordinary Brightway database
    creation integration tests. Superstructure and incremental tests are intentionally excluded.

    '
  amount: 1
tolerance:
  # LCIA scores can drift slightly across Brightway/importer versions. Keep
  # these checks at coarse regression precision instead of double precision.
  relative: 3.0e-02
  absolute: 1.0e-09
activities:
  electricity_low_voltage_ch:
    name: market for electricity, low voltage
    reference product: electricity, low voltage
    location: CH
    unit: kilowatt hour
  heat_natural_gas_europe:
    name: market for heat, district or industrial, natural gas
    reference product: heat, district or industrial, natural gas
    location: Europe without Switzerland
    unit: megajoule
  diesel_europe:
    name: market for diesel
    reference product: diesel
    location: Europe without Switzerland
    unit: kilogram
  cement_portland_europe:
    name: market for cement, Portland
    reference product: cement, Portland
    location: Europe without Switzerland
    unit: kilogram
  steel_low_alloyed_glo:
    name: market for steel, low-alloyed
    reference product: steel, low-alloyed
    location: GLO
    unit: kilogram
