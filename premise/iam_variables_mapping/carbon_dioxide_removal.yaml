# mapping between premise and IAM terminology
# regarding direct air capture use

# Direct air capture mappings are carrier-specific where IAM final-energy
# variables distinguish electricity, gases, heat, or hydrogen use.

---

direct air capture (solvent, gas heat) with storage:
  iam_aliases:
    remind: Emi|CO2|CDR|+|DACCS
    remind-eu: Emi|CO2|CDR|+|DACCS
    image:
      - Carbon Removal|Geological Storage|Direct Air Capture|Liquid Solvent
      - Carbon Capture|Geological Storage|Direct Air Capture
  energy_use_aliases:
    gases:
      image:
        - Final Energy|Carbon Management|Direct Air Capture|Liquid Solvent|Gases
        - Final Energy|Carbon Management|Direct Air Capture|Gases
      remind: FE|CDR|DAC|+|Gases
      remind-eu: FE|CDR|DAC|+|Gases
  ecoinvent_aliases:
    fltr:
      - carbon dioxide, captured and stored, with a solvent-based direct air capture system, 1MtCO2
    mask:
      - waste
      - industrial
      - heat pump
      - hydrogen

