# mapping between premise and IAM terminology
# regarding direct air capture use

# potential future improvement: distinguish between solvent-based
# and sorbent-based direct air capture systems

---

direct air capture (solvent) with storage:
  iam_aliases:
    remind: Emi|CO2|CDR|+|DACCS
    remind-eu: Emi|CO2|CDR|+|DACCS
    image: Carbon Removal|Geological Storage|Direct Air Capture|Liquid Solvent
    tiam-ucl: Carbon Capture|Storage|Direct Air Capture
    witch: Carbon Sequestration|Direct Air Capture|Solvent
    gcam: Carbon Sequestration|Direct Air Capture|Solvent
  energy_use_aliases:
    electricity:
      image: Final Energy|Carbon Management|Direct Air Capture|Liquid Solvent|Electricity
      remind: FE|CDR|DAC|+|Electricity
      remind-eu: FE|CDR|DAC|+|Electricity
      tiam-ucl: Secondary Energy|Consumption|Direct Air Capture|Electricity
      witch:
        - Final Energy|Carbon Management|Direct Air Capture|Solvent|Electricity|PV
        - Final Energy|Carbon Management|Direct Air Capture|Solvent|Electricity|CSP
      message: Final Energy|Carbon Management|Direct Air Capture|Solvent|Electricity
    gases:
      image: Final Energy|Carbon Management|Direct Air Capture|Liquid Solvent|Gases
      remind: FE|CDR|DAC|+|Gases
      remind-eu: FE|CDR|DAC|+|Gases
      message: Final Energy|Carbon Management|Direct Air Capture|Gases
    heat:
      remind: FE|CDR|DAC|+|Heat
      remind-eu: FE|CDR|DAC|+|Heat
      tiam-ucl: Secondary Energy|Consumption|Direct Air Capture|Heat
    hydrogen:
      remind: FE|CDR|DAC|+|Hydrogen
      remind-eu: FE|CDR|DAC|+|Hydrogen

  ecoinvent_aliases:
    fltr:
      - carbon dioxide, captured and stored, with a solvent-based direct air capture system, 1MtCO2

    mask:
      - waste
      - industrial
      - heat pump

direct air capture (sorbent) with storage:
  iam_aliases:
    witch: Carbon Sequestration|Direct Air Capture|Sorbent
    gcam: Carbon Sequestration|Direct Air Capture|Sorbent
    message: Carbon Capture|Direct Air Capture|Sorbent
    image: Carbon Removal|Geological Storage|Direct Air Capture|Solid Sorbent
  energy_use_aliases:
    electricity:
      witch: Final Energy|Carbon Management|Direct Air Capture|Sorbent|Electricity|CSP
      message: Final Energy|Carbon Management|Direct Air Capture|Sorbent|Electricity
      image: Final Energy|Carbon Management|Direct Air Capture|Solid Sorbent|Electricity
    gases:
      witch: Final Energy|Carbon Management|Direct Air Capture|Sorbent|Heat|Gases
      image: Final Energy|Carbon Management|Direct Air Capture|Solid Sorbent|Gases

  ecoinvent_aliases:
    fltr:
      - carbon dioxide, captured and stored, with a sorbent-based direct air capture system, 100ktCO2

